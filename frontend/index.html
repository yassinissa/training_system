<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Green Hills Training</title>

    <!-- PWA / install metadata -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1565c0" />
    <meta name="description" content="Green Hills employee training and certification platform." />

    <!-- iOS install support (Safari ignores manifest icons / theme-color) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GH Training" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register the service worker. The SW lives at /sw.js (root scope)
      // so it can control the whole app. Failures are silent — the site
      // still works fine without a SW, just no offline / install prompt.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
  </html>
