# Render Blueprint - one file describes the whole infrastructure for this app.
# Push this repo to GitHub, then in Render click "New > Blueprint" and pick
# this repo. Render will create:
#   * a managed PostgreSQL database
#   * a Web Service that runs Django + the React build
#
# After the first deploy, the service URL will be:
#   https://<service-name>.onrender.com
#
# To set up a Django superuser the first time, open the Render service
# "Shell" tab and run:
#   python manage.py createsuperuser

databases:
  - name: training-db
    plan: free
    databaseName: training_system
    user: training

services:
  - type: web
    name: training-system
    runtime: python
    plan: free                 # upgrade to "starter" ($7/mo) to remove sleep
    region: oregon
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --workers 2 --threads 2 --bind 0.0.0.0:$PORT"
    healthCheckPath: /admin/login/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: NODE_VERSION
        value: "20.11.1"
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        # leave blank to rely on Render's auto-populated RENDER_EXTERNAL_HOSTNAME;
        # OR list extra hosts here later, e.g. "training-system.onrender.com,training.mydomain.com"
        value: ""
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: ""
      - key: DJANGO_CORS_ORIGINS
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: training-db
          property: connectionString
      - key: RENDER
        value: "true"

  # Optional cron - runs the yearly-competency-expiry reminders once a day at 06:00 UTC.
  # Remove this block if you don't want the daily reminder yet.
  - type: cron
    name: training-reminders-daily
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: "pip install -r requirements.txt"
    schedule: "0 6 * * *"
    startCommand: "python manage.py send_competency_reminders"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        fromService:
          name: training-system
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: training-db
          property: connectionString
      - key: RENDER
        value: "true"
